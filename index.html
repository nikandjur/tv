				display: grid;

				max-width: 1400px;
				margin: 0 auto;
			}
			.app-button {

				align-items: center;
				text-align: center;
				font-size: 15px;
				font-weight: 500;
				border-radius: 10px;
				border: 3px solid transparent;
				box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
				text-decoration: none;
				outline: none;
				transition: all 0.2s ease;
				cursor: pointer;
				box-sizing: border-box;
				font-family: inherit;
				position: relative;
				overflow: hidden;
			}
			.app-button span {
				color: white !important;
				text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
				z-index: 1;
				position: relative;

			}

			}
			.app-grid .app-button:nth-child(6) {

			}
			.app-grid .app-button:nth-child(8) {

			}
			.app-grid .app-button:nth-child(9) {

			}
			.app-grid .app-button:nth-child(10) {
				background-color: #f44336;
			}
			.app-grid .app-button:nth-child(11) {
				background-color: #8bc34a;
			}
			.app-grid .app-button:nth-child(12) {
				background-color: #795548;
			}
			.app-grid .app-button:nth-child(13) {
				background-color: #bfa84a;
			}
			.app-grid .app-button:nth-child(14) {
				background-color: #990000;
			}
			.app-grid .app-button:nth-child(15) {
				background-color: #1585c4;
			}
			.app-grid .app-button:nth-child(16) {
				background-color: #c415b6;
			}
			.app-button:hover span {
				color: black !important;
				text-shadow: none;
			}
			.app-button.tv-focused {
				background-color: #7c4dff !important;
				border-color: white !important;
				box-shadow: 0 0 30px rgba(124, 77, 255, 1) !important;
				transform: scale(1.12) !important;
				z-index: 10;
			}
			.app-button.tv-focused span {
				color: black !important;
				font-weight: bold;
				text-shadow: none;
			}
			@media (pointer: coarse) {
				body {
					-webkit-user-select: none;
					user-select: none;
				}
				.app-grid {
					grid-template-columns: repeat(6, 150px);
					gap: 20px;
					padding: 30px;
				}
				.app-button {
					width: 150px;
					height: 90px;
					font-size: 16px;
					border-radius: 12px;
				}
				.app-button:focus {
					background-color: #7c4dff;
					border-color: white;
					box-shadow: 0 0 25px rgba(124, 77, 255, 1);
					transform: scale(1.12);
				}
				.app-button:focus span {
					color: black;
				}
			}
			@media (hover: hover) and (pointer: fine) {
				.app-button:hover {
					background-color: #7c4dff;
					transform: scale(1.05);
				}
				.app-button:focus {
					border-color: #bb86fc;
					box-shadow: 0 0 10px rgba(124, 77, 255, 0.5);
				}
			}
			@media (max-width: 1200px) {
				.app-grid {
					grid-template-columns: repeat(4, 150px);
				}
			}
			@media (max-width: 768px) {
				.app-grid {
					grid-template-columns: repeat(3, 150px);
					gap: 12px;
					padding: 15px;
				}
				.app-button {
					width: 150px;
					height: 90px;
					font-size: 14px;
				}
			}
			@media (max-width: 500px) {
				.app-grid {
					grid-template-columns: repeat(2, 150px);
				}
			}
		</style>
	</head>

		<script>
			;(function () {
				const grid = document.getElementById('appGrid')
				const buttons = Array.from(grid.querySelectorAll('.app-button'))
				let columns = 6
				let currentIndex = 0

				function updateColumns() {
					const width = window.innerWidth
					if (width <= 500) {
						columns = 2
					} else if (width <= 768) {
						columns = 3
					} else if (width <= 1200) {
						columns = 4
					} else {
						columns = 6
					}
				}

				function setFocus(index) {
					buttons.forEach(btn => {
						btn.classList.remove('tv-focused')
						btn.blur()
					})
					if (buttons[index]) {
						currentIndex = index
						buttons[index].classList.add('tv-focused')
						buttons[index].focus()
						buttons[index].scrollIntoView({
							behavior: 'smooth',
							block: 'center',
							inline: 'center',
						})
					}
				}

				function handleKeyDown(e) {
					const key = e.key || e.keyCode
					if (key === 'ArrowRight' || key === 39) {
						e.preventDefault()
						const newIndex = currentIndex + 1
						if (newIndex < buttons.length) {
							setFocus(newIndex)
						}
					} else if (key === 'ArrowLeft' || key === 37) {
						e.preventDefault()
						const newIndex = currentIndex - 1
						if (newIndex >= 0) {
							setFocus(newIndex)
						}
					} else if (key === 'ArrowDown' || key === 40) {
						e.preventDefault()
						const newIndex = currentIndex + columns
						if (newIndex < buttons.length) {
							setFocus(newIndex)
						}
					} else if (key === 'ArrowUp' || key === 38) {
						e.preventDefault()
						const newIndex = currentIndex - columns
						if (newIndex >= 0) {
							setFocus(newIndex)
						}
					} else if (key === 'Enter' || key === 13) {
						e.preventDefault()
						if (buttons[currentIndex]) {
							const link = buttons[currentIndex].getAttribute('href')
							if (link) {
								window.location.href = link
							}
						}
					}
				}

				buttons.forEach((btn, index) => {
					btn.addEventListener('click', function (e) {
						currentIndex = index
					})
					btn.addEventListener('mouseenter', function () {
						setFocus(index)
					})
				})

				document.addEventListener('keydown', handleKeyDown)
				window.addEventListener('resize', updateColumns)
				window.addEventListener('load', function () {
					updateColumns()
					setTimeout(() => setFocus(0), 100)
				})

				if (document.readyState === 'complete') {
					updateColumns()
					setTimeout(() => setFocus(0), 100)
				}
			})()
		</script>
